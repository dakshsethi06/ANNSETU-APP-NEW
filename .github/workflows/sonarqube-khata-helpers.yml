name: SonarQube - khataHelpers

on:
  push:
    paths:
      - 'mobile/src/features/farmer/utils/khataHelpers.js'
    branches:
      - main
  pull_request:
    paths:
      - 'mobile/src/features/farmer/utils/khataHelpers.js'
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  sonarqube-khata-helpers:
    name: SonarQube Analysis - khataHelpers.js
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7
        with:
          args: >
            -Dsonar.sources=mobile/src/features/farmer/utils/khataHelpers.js
            -Dsonar.projectKey=annsetu-khata-helpers
            -Dsonar.projectName=AnnSetu KhataHelpers
            -Dsonar.inclusions=mobile/src/features/farmer/utils/khataHelpers.js
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
